<script>
    /* 全局 axios 设置 */
    axios.defaults.baseURL = '/api';
    axios.interceptors.response.use(function (res) {
        if (res.data.code !== 0 && res.data.message === '未登录') {
            location.href = '../login.html';    // 改成你的登录页
        }
        return res;
    });

    /* 全局工具函数 */
    function fmtDate(d) {
        return new Date(d).toLocaleString('zh-CN');
    }
</script>
