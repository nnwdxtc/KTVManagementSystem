<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>个人中心</title>

    <!-- 1. 登录检查（不限制角色） -->
    <script src="/js/check-auth.js"></script>

    <!-- 2. 公共头 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="/js/common-head.js"></script>

    <!-- 3. 极简头像区样式 -->
    <style>
        .avatar-box{
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .avatar-img{
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #dee2e6;
        }
        .upload-btn{
            font-size: .85rem;
            padding: .25rem .6rem;
        }
        .upload-btn:hover{
            background-color: #0b5ed7;
            border-color: #0a58ca;
            color: #fff;
        }
    </style>
</head>
<body>
<!-- 4. 导航栏 -->
<div id="nav-placeholder"></div>
<script src="/js/nav-bar.js"></script>

<!-- 返回主页 -->
<div class="container mt-2">
    <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary">← 返回</a>
</div>

<div class="container mt-3">
    <h4>个人中心</h4>

    <!-- 头像区域（低调版） -->
    <div class="avatar-box">
        <img id="avatarImg" class="avatar-img" src="/api/avatar" alt="头像">
        <div>
            <div class="small text-muted mb-1">点击右侧按钮上传新头像</div>
            <form id="avatarForm" class="d-inline">
                <input type="file" id="fileInput" class="d-none" name="file" accept=".jpg,.png" required>
                <button type="button" class="btn btn-outline-primary btn-sm upload-btn"
                        onclick="$('#fileInput').click()">
                    📷 上传头像
                </button>
            </form>
        </div>
    </div>

    <!-- 修改密码（通用） -->
    <form id="pwdForm" class="mb-4">
        <div class="mb-3">
            <label>原密码</label>
            <input type="password" class="form-control" name="oldPwd" required>
        </div>
        <div class="mb-3">
            <label>新密码</label>
            <input type="password" class="form-control" name="newPwd" required>
        </div>
        <button class="btn btn-warning" type="submit">修改密码</button>
    </form>

    <!-- 仅顾客可见：修改手机号 -->
    <div id="phoneDiv" class="d-none">
        <hr>
        <form id="phoneForm">
            <div class="mb-3">
                <label>新手机号</label>
                <input class="form-control" name="newPhone" pattern="^1[3-9]\d{9}$" required>
            </div>
            <button class="btn btn-info" type="submit">修改手机号</button>
        </form>
    </div>
</div>

<script>
    const user = JSON.parse(sessionStorage.getItem('user') || {});

    $('[name=oldPwd]').val(user.user.password);

    /* 修改密码 */
    $('#pwdForm').submit(function (e) {
        e.preventDefault();
        axios.post('/auth/changePwd', {
            account: user.user.account,
            oldPwd: $('[name=oldPwd]').val(),
            newPwd: $('[name=newPwd]').val()
        }).then(res => {
            alert(res.data.success ? '密码已修改' : '原密码错误');
        });
    });

    /* 仅顾客显示手机号修改 */
    if (user.role === '顾客') {
        $('#phoneDiv').removeClass('d-none');
        $('#phoneForm').submit(function (e) {
            e.preventDefault();
            axios.put('/customer/phone', {
                customerId: user.user.account,
                newPhone: $('[name=newPhone]').val()
            }).then(res => alert(res.data.success ? '手机号已修改' : '修改失败'));
        });
    }

    $('#fileInput').change(function () {
        if (!this.files.length) return;
        const formData = new FormData($('#avatarForm')[0]);
        axios.post('/avatar/upload', formData, {
            headers: {'Content-Type': 'multipart/form-data'}
        }).then(res => {
            alert(res.data.success ? '上传成功' : res.data.message);
            if (res.data.success) {
                $('#avatarImg').attr('src', '/api/avatar?t=' + Date.now());
            }
            // 关键：上传完立刻清空，让浏览器认为下次是同“新”文件
            $('#fileInput').val('');
        });
    });
</script>
</body>
</html>
