<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>顾客注册</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="container mt-5" style="max-width:400px">
  <h3 class="text-center mb-4">顾客注册</h3>
  <form id="form">
    <input type="hidden" name="role" value="顾客">
    <div class="mb-3">
      <label class="form-label">账号</label>
      <input class="form-control" name="account" required>
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <div class="mb-3">
      <label class="form-label">姓名</label>
      <input class="form-control" name="name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">手机号</label>
      <input class="form-control" name="phone" pattern="^1[3-9]\d{9}$" required>
    </div>
    <div class="mb-3">
      <label class="form-label">性别</label>
      <select class="form-select" name="gender">
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
    </div>
    <button class="btn btn-success w-100" type="submit">注册</button>
    <div class="text-center mt-3">
      <a href="login.html">已有账号？去登录</a>
    </div>
  </form>
</div>

<script>
  $('#form').submit(function (e) {
    e.preventDefault();
    const data = Object.fromEntries(
            $(this).serializeArray().map(i => [i.name, i.value])
    );
    axios.post('/api/auth/register', data)
            .then(res => {
              if (res.data.success) {
                alert('注册成功！');
                location.href = 'login.html';
              } else {
                alert(res.data.message || '注册失败');
              }
            })
            .catch(err => {
              console.error('注册错误:', err);
              alert('注册请求失败，请检查网络连接');
            });
  });
</script>
</body>
</html>
