<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>顾客预约单</title>

    <!-- 1. 登录 & 角色检查（只允许 WAITER） -->
    <script src="/js/check-auth.js?role=服务员"></script>

    <!-- 2. 公共头 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ 新增：Simple-DataTables CSS -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.2.0/dist/style.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>

    <!-- ✅ 新增：Simple-DataTables JS -->
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.2.0/dist/umd/simple-datatables.js"></script>

    <script src="/js/common-head.js"></script>

    <style>
        /* 确保Simple-DataTables样式正确显示 */
        .datatable-search input {
            width: 200px !important;
            display: inline-block !important;
        }
        .datatable-wrapper {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<!-- 3. 导航栏 -->
<div id="nav-placeholder"></div>
<script src="/js/nav-bar.js"></script>
<!-- 返回主页 -->
<div class="container mt-2">
    <a href="/waiter/index.html" class="btn btn-sm btn-outline-secondary">← 返回主页</a>
</div>
<div class="container mt-3">
    <h4>顾客预约单</h4>
    <div class="mb-2">
        <button class="btn btn-sm btn-outline-primary" onclick="load()">刷新</button>
        <button class="btn btn-sm btn-warning" onclick="testLibrary()">测试分页库</button>
    </div>

    <!-- ✅ 修改表格：添加datatable类和id -->
    <table class="table table-bordered datatable" id="bookListTable">
        <thead>
        <tr>
            <th>房间号</th>
            <th>房间类型</th>
            <th>预约人账号</th>
            <th>预约时段</th>
            <th>状态</th>
        </tr>
        </thead>
        <tbody id="tb"></tbody>
    </table>
</div>

<script>
    // 测试库加载函数
    function testLibrary() {
        console.log('测试库加载状态...');
        console.log('simpleDatatables:', typeof window.simpleDatatables);
        console.log('全局变量检查:', window.simpleDatatables);

        if (typeof window.simpleDatatables !== 'undefined') {
            alert('✅ Simple-DataTables库已加载！');
            console.log('库详情:', window.simpleDatatables);
        } else {
            alert('❌ Simple-DataTables库未加载！');
            console.log('尝试加载库...');

            // 动态加载库
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/simple-datatables@7.2.0/dist/umd/simple-datatables.js';
            script.onload = function() {
                alert('✅ 动态加载库成功！');
                console.log('加载后的simpleDatatables:', window.simpleDatatables);
                // 重新加载数据
                load();
            };
            script.onerror = function() {
                alert('❌ 动态加载库失败！');
            };
            document.head.appendChild(script);
        }
    }

    // 修改load函数
    function load() {
        console.log('开始加载数据...');

        axios.get('/room/rooms').then(res => {
            console.log('数据加载成功:', res.data);

            const list = (res.data.data || []).filter(r => r.roomStatus != '未预约');
            console.log('过滤后的数据:', list);

            let h = '';

            if (list.length === 0) {
                h = '<tr><td colspan="5" class="text-center">暂无预约记录</td></tr>';
            } else {
                list.forEach(r => {
                    h += `<tr>
                    <td>${r.roomId}</td>
                    <td>${r.roomType}</td>
                    <td>${r.customerId || '--'}</td>
                    <td>${fmtDate(r.startDate)} ~ ${fmtDate(r.endDate)}</td>
                    <td><span class="badge bg-warning">已预约</span></td>
                </tr>`;
                });
            }

            $('#tb').html(h);

            // ✅ 初始化Simple-DataTables
            setTimeout(() => {
                console.log('尝试初始化Simple-DataTables...');
                console.log('simpleDatatables状态:', typeof window.simpleDatatables);

                if (typeof window.simpleDatatables !== 'undefined') {
                    const table = document.querySelector('#bookListTable');
                    if (table) {
                        // 如果已经初始化过，先销毁
                        if (table.datatable) {
                            table.datatable.destroy();
                        }

                        try {
                            // 初始化
                            table.datatable = new simpleDatatables.DataTable(table, {
                                perPage: 5,
                                perPageSelect: [5, 10, 20],
                                searchable: true,
                                sortable: true,
                                labels: {
                                    placeholder: "搜索房间号或账号...",
                                    perPage: "每页显示 {select} 条",
                                    noRows: "没有找到相关数据",
                                    info: "显示第 {start} 到 {end} 条，共 {rows} 条数据"
                                }
                            });
                            console.log('✅ Simple-DataTables初始化成功！', table.datatable);
                        } catch (error) {
                            console.error('初始化出错:', error);
                        }
                    } else {
                        console.error('未找到表格元素 #bookListTable');
                    }
                } else {
                    console.error('Simple-DataTables库未加载，无法初始化！');
                    alert('请先点击"测试分页库"按钮加载库');
                }
            }, 300);
        }).catch(error => {
            console.error('加载数据失败:', error);
        });
    }

    // 页面加载完成后执行
    $(document).ready(function() {
        console.log('页面加载完成');

        // 先测试库是否加载
        if (typeof window.simpleDatatables !== 'undefined') {
            console.log('库已加载，开始加载数据');
            load();
        } else {
            console.log('库未加载，显示提示');
            $('#tb').html('<tr><td colspan="5" class="text-center">请先点击"测试分页库"按钮</td></tr>');
        }
    });
</script>
</body>
</html>
