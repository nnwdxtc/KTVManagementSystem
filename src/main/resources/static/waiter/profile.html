<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>个人中心</title>

    <script src="/js/check-auth.js"></script>

    <!-- 2. 公共头 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="/js/common-head.js"></script>
</head>
<body>
<!-- 3. 导航栏 -->
<div id="nav-placeholder"></div>
<script src="/js/nav-bar.js"></script>
<!-- 返回主页 -->
<div class="container mt-2">
    <a href="/waiter/index.html" class="btn btn-sm btn-outline-secondary">← 返回主页</a>
</div>

<div class="container mt-3">
    <h4>个人中心</h4>

    <!-- 修改密码（通用） -->
    <form id="pwdForm" class="mb-4">
        <div class="mb-3"><label>原密码</label><input type="password" class="form-control" name="oldPwd" required></div>
        <div class="mb-3"><label>新密码</label><input type="password" class="form-control" name="newPwd" required></div>
        <button class="btn btn-warning" type="submit">修改密码</button>
    </form>

    <!-- 顾客才显示手机修改 -->
    <div id="phoneDiv" class="d-none">
        <hr>
        <form id="phoneForm">
            <div class="mb-3"><label>新手机号</label><input class="form-control" name="newPhone" pattern="^1[3-9]\d{9}$" required></div>
            <button class="btn btn-info" type="submit">修改手机号</button>
        </form>
    </div>
</div>

<script>
    const user = JSON.parse(sessionStorage.getItem('user') || '{}');

    // 密码修改
    $('#pwdForm').submit(function (e) {
        e.preventDefault();
        axios.post('/auth/changePwd', {
            account: user.user.account,
            oldPwd: $('[name=oldPwd]').val(),
            newPwd: $('[name=newPwd]').val()
        }).then(res => {
            alert(res.data.message  ?'密码已修改' : '原密码错误');
        });
    });

    // 只有顾客才显示手机修改区域
    if (user.role === '顾客') {
        $('#phoneDiv').removeClass('d-none');
        $('#phoneForm').submit(function (e) {
            e.preventDefault();
            const newPhone = $('[name=newPhone]').val();
            axios.put('/api/customer/phone', {
                customerId: user.user.account,
                newPhone: newPhone
            }).then(() => alert('手机号已修改'));
        });
    }
</script>
</body>
</html>
