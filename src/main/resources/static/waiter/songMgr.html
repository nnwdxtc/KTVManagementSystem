<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>歌曲管理</title>

    <!-- 1. 登录 & 角色检查（仅 WAITER） -->
    <script src="/js/check-auth.js?role=服务员"></script>

    <!-- 2. 公共头 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="/js/common-head.js"></script>

    <style>
        .table-container {
            min-height: 400px;
        }
        .pagination-sm .page-link {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .page-size-selector {
            width: 80px;
            display: inline-block;
        }
    </style>
</head>
<body>
<!-- 3. 导航栏 -->
<div id="nav-placeholder"></div>
<script src="/js/nav-bar.js"></script>
<!-- 返回主页 -->
<div class="container mt-2">
    <a href="/waiter/index.html" class="btn btn-sm btn-outline-secondary">← 返回主页</a>
</div>
<div class="container mt-3">
    <h4>歌曲信息管理</h4>

    <!-- 操作栏 -->
    <div class="row mb-3">
        <div class="col-md-6">
            <button class="btn btn-primary btn-sm" onclick="editSong()">新增歌曲</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="loadSongs()">刷新</button>

            <!-- 每页显示条数选择 -->
            <div class="d-inline-block ms-2">
                <select class="form-select form-select-sm page-size-selector" id="pageSizeSelect" onchange="changePageSize()">
                    <option value="5">5条/页</option>
                    <option value="10" selected>10条/页</option>
                    <option value="15">15条/页</option>
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                </select>
            </div>
        </div>
        <div class="col-md-6">
            <div class="input-group input-group-sm">
                <input class="form-control" id="kw" placeholder="搜索歌名或歌手" />
                <button class="btn btn-outline-secondary" onclick="searchSongs()">搜索</button>
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="table-container">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th width="80">ID</th>
                <th>歌名</th>
                <th>歌手</th>
                <th width="150">操作</th>
            </tr>
            </thead>
            <tbody id="tb"></tbody>
        </table>
    </div>

    <!-- 分页控件 -->
    <div class="row mt-3">
        <div class="col-md-6">
            <div id="pageInfo" class="text-muted small"></div>
        </div>
        <div class="col-md-6">
            <nav aria-label="歌曲分页">
                <ul class="pagination pagination-sm justify-content-end" id="pagination">
                    <!-- 分页按钮将通过JS动态生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增歌曲</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="form">
                <div class="modal-body">
                    <input type="hidden" name="songId" />
                    <div class="mb-3">
                        <label class="form-label">歌名 <span class="text-danger">*</span></label>
                        <input class="form-control" name="title" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">歌手 <span class="text-danger">*</span></label>
                        <input class="form-control" name="artist" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">专辑</label>
                        <input class="form-control" name="album" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">时长(秒)</label>
                        <input type="number" class="form-control" name="duration" min="0" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 分页参数
    let currentPage = 1;
    let pageSize = 10;
    let totalRecords = 0;
    let totalPages = 1;
    let keyword = '';
    let allSongs = [];

    /* 加载歌曲数据 */
    function loadSongs(page = 1) {
        currentPage = page;
        keyword = $('#kw').val().trim();

        // 显示加载状态
        $('#tb').html(`
            <tr>
                <td colspan="4" class="text-center py-4">
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    加载中...
                </td>
            </tr>
        `);

        console.log(`正在请求数据: page=${page}, size=${pageSize}, keyword=${keyword}`);

        axios.get('/song/manage/page', {
            params: {
                current: page,
                size: pageSize,
                keyword: keyword
            }
        })
            .then(res => {
                console.log('响应数据:', res.data);

                if (!res.data || !res.data.data) {
                    throw new Error('数据格式错误');
                }

                const pageData = res.data.data;
                allSongs = pageData.records || [];
                totalRecords = pageData.total || 0;
                totalPages = pageData.pages || 1;
                currentPage = pageData.current || 1;

                console.log(`获取到 ${allSongs.length} 首歌曲, 总共 ${totalRecords} 首, ${totalPages} 页`);

                renderTable();
                renderPagination();
                updatePageInfo();
            })
            .catch(error => {
                console.error('加载失败:', error);
                $('#tb').html(`
                <tr>
                    <td colspan="4" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        加载失败: ${error.response?.data?.message || error.message}
                    </td>
                </tr>
            `);
                renderPagination(); // 仍然渲染分页控件（可能为空）
            });
    }

    /* 渲染表格 */
    function renderTable() {
        if (!allSongs || allSongs.length === 0) {
            $('#tb').html(`
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">
                        <i class="bi bi-music-note-list me-2"></i>
                        暂无歌曲数据
                    </td>
                </tr>
            `);
            return;
        }

        let html = '';
        allSongs.forEach((song, index) => {
            const songId = song.songId || '';
            const title = song.title || '';
            const artist = song.artist || '';
            const album = song.album || '';
            const duration = song.duration || 0;

            // 计算行号（考虑分页）
            const rowNumber = (currentPage - 1) * pageSize + index + 1;

            // 安全转义
            const safeTitle = escapeString(title);
            const safeArtist = escapeString(artist);
            const safeAlbum = escapeString(album);

            html += `
                <tr>
                    <td>${songId}</td>
                    <td>
                        <div class="fw-medium">${title}</div>
                        ${album ? `<small class="text-muted">${album}</small>` : ''}
                    </td>
                    <td>${artist}</td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-warning"
                                onclick="editSong(${songId}, '${safeTitle}', '${safeArtist}', '${safeAlbum}', ${duration})">
                                编辑
                            </button>
                            <button class="btn btn-danger"
                                onclick="delSong(${songId})">
                                删除
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });

        $('#tb').html(html);
    }

    /* 渲染分页控件 */
    function renderPagination() {
        if (totalPages <= 1) {
            $('#pagination').html('');
            return;
        }

        let html = '';
        const maxPagesToShow = 5; // 最多显示5个页码

        // 上一页按钮
        html += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="${currentPage > 1 ? `loadSongs(${currentPage - 1})` : ''}">
                    &laquo;
                </a>
            </li>
        `;

        // 计算显示的页码范围
        let startPage = Math.max(1, currentPage - Math.floor(maxPagesToShow / 2));
        let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);

        // 调整起始页，确保显示 maxPagesToShow 个页码
        if (endPage - startPage + 1 < maxPagesToShow) {
            startPage = Math.max(1, endPage - maxPagesToShow + 1);
        }

        // 第一页（如果有必要）
        if (startPage > 1) {
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:loadSongs(1)">1</a>
                </li>
            `;
            if (startPage > 2) {
                html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            }
        }

        // 页码按钮
        for (let i = startPage; i <= endPage; i++) {
            html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:loadSongs(${i})">${i}</a>
                </li>
            `;
        }

        // 最后一页（如果有必要）
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            }
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:loadSongs(${totalPages})">${totalPages}</a>
                </li>
            `;
        }

        // 下一页按钮
        html += `
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="${currentPage < totalPages ? `loadSongs(${currentPage + 1})` : ''}">
                    &raquo;
                </a>
            </li>
        `;

        $('#pagination').html(html);
    }

    /* 更新页面信息 */
    function updatePageInfo() {
        if (totalRecords === 0) {
            $('#pageInfo').html('暂无数据');
            return;
        }

        const start = (currentPage - 1) * pageSize + 1;
        const end = Math.min(currentPage * pageSize, totalRecords);

        let info = `显示第 ${start} 到 ${end} 条记录，共 ${totalRecords} 条`;
        if (keyword) {
            info += `（搜索关键词: "${keyword}"）`;
        }

        $('#pageInfo').html(info);
    }

    /* 转义字符串 */
    function escapeString(str) {
        if (!str) return '';
        return str
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/"/g, '\\"')
            .replace(/\n/g, '\\n')
            .replace(/\r/g, '\\r');
    }

    /* 搜索歌曲 */
    function searchSongs() {
        currentPage = 1; // 搜索时重置到第一页
        loadSongs(currentPage);
    }

    /* 改变每页显示条数 */
    function changePageSize() {
        pageSize = parseInt($('#pageSizeSelect').val());
        currentPage = 1; // 改变分页大小时重置到第一页
        loadSongs(currentPage);
    }

    /* 打开新增/编辑弹窗 */
    function editSong(songId, name, singer, album, duration) {
        $('#modalTitle').text(songId ? '编辑歌曲' : '新增歌曲');
        $('[name=songId]').val(songId || '');
        $('[name=title]').val(name || '');
        $('[name=artist]').val(singer || '');
        $('[name=album]').val(album || '');
        $('[name=duration]').val(duration || '');

        const modal = new bootstrap.Modal(document.getElementById('modal'));
        modal.show();
    }

    /* 保存歌曲 */
    $('#form').submit(function (e) {
        e.preventDefault();

        const title = $('[name=title]').val().trim();
        const artist = $('[name=artist]').val().trim();

        if (!title || !artist) {
            alert('歌名和歌手不能为空');
            return;
        }

        const data = {
            songId: $('[name=songId]').val() || undefined,
            title: title,
            artist: artist,
            album: $('[name=album]').val().trim() || undefined,
            duration: $('[name=duration]').val() || 0
        };

        const saveBtn = $(this).find('button[type="submit"]');
        const originalText = saveBtn.html();
        saveBtn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> 保存中...');

        axios.post('/song/manage', data)
            .then(() => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('modal'));
                modal.hide();
                $('#form')[0].reset();
                loadSongs(currentPage); // 保存后停留在当前页
                saveBtn.prop('disabled', false).html(originalText);
            })
            .catch(err => {
                console.error('保存失败:', err);
                alert('保存失败: ' + (err.response?.data?.message || err.message));
                saveBtn.prop('disabled', false).html(originalText);
            });
    });

    /* 删除歌曲 */
    function delSong(id) {
        if (!confirm('确定删除这首歌曲吗？删除后无法恢复。')) return;

        axios.delete('/song/manage?ids=' + id)
            .then(res => {
                if (res.data.success) {
                    alert('删除成功');
                    // 如果当前页删除最后一条记录且不是第一页，则跳转到前一页
                    if (allSongs.length === 1 && currentPage > 1) {
                        loadSongs(currentPage - 1);
                    } else {
                        loadSongs(currentPage);
                    }
                } else {
                    alert(res.data.message || '删除失败');
                }
            })
            .catch(err => {
                console.error('删除错误:', err);
                alert('删除失败: ' + (err.response?.data?.message || err.message));
            });
    }

    /* 页面初始化 */
    $(document).ready(function() {
        console.log('页面初始化...');

        // 绑定事件
        $('#modal').on('hidden.bs.modal', function () {
            $('#form')[0].reset();
            $('[name=songId]').val('');
        });

        // 输入框回车搜索
        $('#kw').on('keypress', function(e) {
            if (e.which === 13) {
                searchSongs();
            }
        });

        // 防抖搜索
        let searchTimer;
        $('#kw').on('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                searchSongs();
            }, 500);
        });

        // 初始化页面
        pageSize = parseInt($('#pageSizeSelect').val());
        loadSongs();
    });
</script>
</body>
</html>
