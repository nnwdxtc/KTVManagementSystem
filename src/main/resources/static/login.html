<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="container mt-5" style="max-width:400px">
  <h3 class="text-center mb-4">KTV 管理系统</h3>
  <form id="form">
    <div class="mb-3">
      <label class="form-label">身份</label>
      <select class="form-select" name="role">
        <option value="顾客">顾客</option>
        <option value="服务员">服务员</option>
      </select>
    </div>
    <div class="mb-3">
      <label>账号</label>
      <input class="form-control" name="account" required>
    </div>
    <div class="mb-3">
      <label>密码</label>
      <input type="password" class="form-control" name="password" required>
    </div>

    <!-- 添加验证码输入 -->
    <div class="mb-3">
      <label>验证码</label>
      <div class="input-group">
        <input type="text" class="form-control" name="captcha" required maxlength="4">
        <span class="input-group-text" style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">
          <span id="captchaText">1234</span>
        </span>
      </div>
      <div class="mt-1">
        <a href="javascript:refreshCaptcha()" class="text-decoration-none">看不清？换一张</a>
      </div>
    </div>

    <button class="btn btn-primary w-100" type="submit">登录</button>
    <div class="text-center mt-3">
      <a href="register.html">还没有账号？去注册</a>
    </div>
  </form>
</div>

<script>
  // 生成验证码
  function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 4; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
  }

  // 刷新验证码
  function refreshCaptcha() {
    const code = generateCaptcha();
    $('#captchaText').text(code);
    // 存储验证码到sessionStorage
    sessionStorage.setItem('captchaCode', code);
    console.log('验证码：', code);
  }

  // 页面加载时生成验证码
  $(function() {
    refreshCaptcha();
  });

  // 表单提交
  $('#form').submit(function (e) {
    e.preventDefault();

    // 获取表单数据
    const formData = $(this).serializeArray();
    const data = {};
    formData.forEach(item => {
      data[item.name] = item.value;
    });

    // 验证验证码
    const savedCode = sessionStorage.getItem('captchaCode');
    if (!savedCode || data.captcha.toUpperCase() !== savedCode) {
      alert('验证码错误');
      refreshCaptcha();
      $('input[name="captcha"]').val('');
      return;
    }

    // 发送登录请求
    axios.post('/api/auth/login', data)
            .then(res => {
              if (res.data.success) {
                const payload = res.data.data;
                const redirectPath = payload.redirect || payload.userType || 'customer';
                sessionStorage.setItem('user', JSON.stringify(payload));
                location.href = redirectPath + '/index.html';
              } else {
                alert(res.data.message || '账号或密码错误');
                refreshCaptcha();
              }
            })
            .catch(err => {
              console.error('登录错误:', err);
              alert('登录请求失败，请检查网络连接');
              refreshCaptcha();
            });
  });
</script>
</body>
</html>
