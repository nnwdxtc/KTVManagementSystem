<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KTV 大厅</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS + Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="text-center mb-4">KTV 管理系统 - 大厅</h2>

    <!-- 1. 房态大屏 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between">
            <span>房间状态</span>
            <button class="btn btn-sm btn-outline-primary" onclick="loadRooms()">刷新</button>
        </div>
        <div class="card-body">
            <div class="btn-group mb-3">
                <button class="btn btn-outline-primary" onclick="loadRooms('')">全部</button>
                <button class="btn btn-outline-success" onclick="loadRooms('未预约')">未预约</button>
                <button class="btn btn-outline-warning" onclick="loadRooms('已预约')">已预约</button>
                <button class="btn btn-outline-danger"  onclick="loadRooms('使用中')">使用中</button>
            </div>
            <table class="table table-sm table-hover">
                <thead><tr><th>房间号</th><th>类型</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="roomTb"></tbody>
            </table>
        </div>
    </div>

    <!-- 2. 快速预约 -->
    <div class="card mb-4">
        <div class="card-header">快速预约</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col"><input class="form-control" id="cid"   placeholder="顾客账号"></div>
                <div class="col"><input class="form-control" id="rno"   placeholder="房间号"></div>
                <div class="col"><input class="form-control" id="start" type="datetime-local"></div>
                <div class="col"><input class="form-control" id="end"   type="datetime-local"></div>
                <div class="col-auto"><button class="btn btn-primary" onclick="reserve()">预约</button></div>
            </div>
        </div>
    </div>

    <!-- 3. 我的预约 / 取消 -->
    <div class="card mb-4">
        <div class="card-header">我的预约</div>
        <div class="card-body">
            <div class="input-group mb-3">
                <input class="form-control" id="myCid" placeholder="输入顾客账号">
                <button class="btn btn-info" onclick="loadMyReserve()">查询</button>
            </div>
            <table class="table table-sm"><thead><tr><th>房间</th><th>开始</th><th>结束</th><th>操作</th></tr></thead>
                <tbody id="myReserveTb"></tbody></table>
        </div>
    </div>

    <!-- 4. 热门歌曲 / 点歌 -->
    <div class="card mb-4">
        <div class="card-header">热门歌曲榜
            <button class="btn btn-sm btn-warning float-end" onclick="loadHot(20)">TOP20</button>
        </div>
        <div class="card-body">
            <div class="input-group mb-3">
                <input class="form-control" id="searchKey" placeholder="搜索歌名或歌手">
                <button class="btn btn-success" onclick="searchSong()">搜索</button>
            </div>
            <table class="table table-sm"><thead><tr><th>歌名</th><th>歌手</th><th>点播</th><th>操作</th></tr></thead>
                <tbody id="songTb"></tbody></table>
        </div>
    </div>

    <!-- 5. 我的已点 / 删除 -->
    <div class="card">
        <div class="card-header">我的已点</div>
        <div class="card-body">
            <div class="input-group mb-3">
                <input class="form-control" id="mySongCid" placeholder="顾客账号">
                <button class="btn btn-outline-primary" onclick="loadMySong()">查询</button>
            </div>
            <table class="table table-sm"><thead><tr><th>歌名</th><th>歌手</th><th>次数</th><th>操作</th></tr></thead>
                <tbody id="mySongTb"></tbody></table>
        </div>
    </div>
</div>

<script>
    const BASE = "http://localhost:8080/api";

    /* 0. 工具 */
    function fmt(t){return t? t.replace("T"," ") : ""}

    /* 1. 房间 */
    function loadRooms(status){
        const url = status ? `${BASE}/room/byStatus?status=${status}` : `${BASE}/room/list`;
        $.get(url, res=>{
            if(!res.success) return alert(res.message);
            let html="";
            res.data.forEach(r=>{
                html+=`<tr>
                     <td>${r.roomNo}</td><td>${r.roomType}</td>
                     <td><span class="badge bg-${r.status==='未预约'?'success':(r.status==='已预约'?'warning':'danger')}">${r.status}</span></td>
                     <td><button class="btn btn-sm btn-primary" onclick="openReserve('${r.roomNo}')">预约</button></td>
                   </tr>`;
            });
            $("#roomTb").html(html);
        });
    }
    function openReserve(roomNo){ $("#rno").val(roomNo); }

    /* 2. 预约 */
    function reserve(){
        const data = {
            customerId: $("#cid").val(),
            roomNo: $("#rno").val(),
            startTime: $("#start").val(),
            endTime: $("#end").val()
        };
        if(!data.customerId || !data.roomNo || !data.startTime || !data.endTime) return alert("请填写完整");
        $.ajax({
            url: `${BASE}/room/reserve`,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: res=>{
                alert(res.message);
                if(res.success){ loadRooms(); $("#cid").val(''); $("#rno").val(''); $("#start").val(''); $("#end").val(''); }
            }
        });
    }

    /* 3. 我的预约 */
    function loadMyReserve(){
        const cid = $("#myCid").val();
        if(!cid) return alert("请输入顾客账号");
        $.get(`${BASE}/room/reserve`, {customerId: cid}, res=>{
            if(!res.success) return alert(res.message);
            let html="";
            res.data.forEach(v=>{
                html+=`<tr>
                     <td>${v.roomNo}</td><td>${fmt(v.startTime)}</td><td>${fmt(v.endTime)}</td>
                     <td><button class="btn btn-sm btn-danger" onclick="cancelReserve('${cid}','${v.roomNo}')">取消</button></td>
                   </tr>`;
            });
            $("#myReserveTb").html(html);
        });
    }
    function cancelReserve(cid,roomNo){
        $.ajax({ url: `${BASE}/room/reserve?customerId=${cid}&roomNo=${roomNo}`, type: 'DELETE', success: res=>{
                alert(res.message); if(res.success) loadMyReserve();
            }});
    }

    /* 4. 歌曲 */
    function loadHot(limit){
        $.get(`${BASE}/song/hot`, {limit}, res=>{
            if(!res.success) return alert(res.message);
            renderSongs(res.data);
        });
    }
    function searchSong(){
        const key = $("#searchKey").val();
        $.get(`${BASE}/song/search`, {keyword: key}, res=>{
            if(!res.success) return alert(res.message);
            renderSongs(res.data);
        });
    }
    function renderSongs(list){
        let html="";
        list.forEach(s=>{
            html+=`<tr>
                 <td>${s.songName}</td><td>${s.singer}</td><td>${s.playCount}</td>
                 <td><button class="btn btn-sm btn-success" onclick="orderSong('${s.songId}','${s.songName}')">点歌</button></td>
               </tr>`;
        });
        $("#songTb").html(html);
    }

    /* 5. 点歌 / 我的已点 */
    function orderSong(songId,name){
        const cid = prompt("请输入顾客账号");
        if(!cid) return;
        $.post(`${BASE}/song/order?customerId=${cid}&songId=${songId}`, res=>{
            alert(res.message); if(res.success) loadMySong();
        });
    }
    function loadMySong(){
        const cid = $("#mySongCid").val();
        if(!cid) return alert("请输入顾客账号");
        $.get(`${BASE}/song/my`, {customerId: cid}, res=>{
            if(!res.success) return alert(res.message);
            let html="";
            res.data.forEach(o=>{
                html+=`<tr>
                     <td>${o.songName}</td><td>${o.singer}</td><td>${o.playCount}</td>
                     <td><button class="btn btn-sm btn-outline-danger" onclick="removeSong(${o.orderId})">删除</button></td>
                   </tr>`;
            });
            $("#mySongTb").html(html);
        });
    }
    function removeSong(orderId){
        $.ajax({ url: `${BASE}/song/order?orderId=${orderId}`, type: 'DELETE', success: res=>{
                alert(res.message); if(res.success) loadMySong();
            }});
    }

    /* 6. 首次加载 */
    $(function(){
        loadRooms();
        loadHot(20);
    });
</script>
</body>
</html>
